kind = "web"
previewPath = "/"
title = "StudentVoice"
version = "1.0.0"
id = "artifacts/student-voice"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18928

[services.development]
run = "pnpm --filter @workspace/student-voice run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/student-voice", "run", "build" ]
publicDir = "artifacts/student-voice/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18928"
BASE_PATH = "/"
